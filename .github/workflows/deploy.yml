name: Deploy to GitHub Pages

# Deploys the static site whenever main is updated (e.g. after a PR merge),
# and can also be run manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true lets this workflow turn on GitHub Pages itself
        # (build type = GitHub Actions), so no manual settings toggle is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site (no build step).
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
